<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; background: #0F172A; font-family: 'Inter', 'Segoe UI', sans-serif; overflow: hidden; }
  .card { position: relative; width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 24px; }
  .glow1 { position: absolute; width: 500px; height: 500px; border-radius: 50%; background: radial-gradient(circle, rgba(26,115,232,0.3), transparent); top: -100px; right: -50px; filter: blur(80px); }
  .glow2 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(0,217,159,0.2), transparent); bottom: -100px; left: -50px; filter: blur(80px); }
  .glow3 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(250,204,21,0.15), transparent); top: 50%; left: 50%; transform: translate(-50%, -50%); filter: blur(60px); }
  .badge { display: inline-flex; align-items: center; gap: 10px; padding: 10px 24px; background: rgba(26,115,232,0.15); border: 1px solid rgba(26,115,232,0.3); border-radius: 100px; color: #1A73E8; font-size: 16px; font-weight: 600; letter-spacing: 0.05em; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #22C55E; }
  h1 { font-size: 72px; font-weight: 800; color: white; letter-spacing: -2px; text-align: center; line-height: 1; z-index: 1; }
  h1 span { color: #1A73E8; }
  .subtitle { font-size: 24px; color: #94A3B8; font-weight: 500; text-align: center; z-index: 1; }
  .tags { display: flex; gap: 12px; margin-top: 8px; z-index: 1; }
  .tag { padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; color: white; }
  .tag1 { background: rgba(26,115,232,0.2); border: 1px solid rgba(26,115,232,0.4); color: #60A5FA; }
  .tag2 { background: rgba(0,217,159,0.15); border: 1px solid rgba(0,217,159,0.3); color: #00D99F; }
  .tag3 { background: rgba(250,204,21,0.15); border: 1px solid rgba(250,204,21,0.3); color: #FACC15; }
  .tag4 { background: rgba(236,72,153,0.15); border: 1px solid rgba(236,72,153,0.3); color: #F472B6; }
  .corner { position: absolute; bottom: 24px; right: 40px; font-size: 14px; color: #475569; font-weight: 500; }
  .flag { position: absolute; bottom: 24px; left: 40px; font-size: 14px; color: #475569; }
</style>
</head>
<body>
<div class="card">
  <div class="glow1"></div>
  <div class="glow2"></div>
  <div class="glow3"></div>
  <div class="badge"><div class="dot"></div> Available for Freelance & Full-time</div>
  <h1>Nicolas<span>.</span>Bustamante</h1>
  <div class="subtitle">Python Developer · AI Automation · Trading Systems</div>
  <div class="tags">
    <div class="tag tag1">🐍 Python</div>
    <div class="tag tag2">🤖 AI Chatbots</div>
    <div class="tag tag3">📈 Trading Bots</div>
    <div class="tag tag4">🌐 EN / ES</div>
  </div>
  <div class="corner">nbustamante.work@gmail.com</div>
  <div class="flag">🇧🇴 Bolivia · 🇺🇸 USA Clients</div>
</div>
</body>
</html>
